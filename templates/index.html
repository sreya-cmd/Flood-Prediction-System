<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Risk Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='predict.css') }}">
</head>

<body>

<nav class="navbar">

    <div class="logo">
        🌊 Flood Prediction System
    </div>

    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/predict">Predict</a></li>
    </ul>

</nav>

<section class="prediction-section">

    <div class="prediction-card">

        <h1>Flood Risk Prediction</h1>

        <p>
            Enter the key environmental factors to predict flood risk.
        </p>

        <form action="/predict" method="POST">

            <div class="form-group">

                <label>Monsoon Intensity</label>

                <input type="number"
                       name="MonsoonIntensity"
                       min="1"
                       max="10"
                       placeholder="Enter value (1-10)"
                       required>

            </div>

            <div class="form-group">

                <label>Topography Drainage</label>

                <input type="number"
                       name="TopographyDrainage"
                       min="1"
                       max="10"
                       placeholder="Enter value (1-10)"
                       required>

            </div>

            <div class="form-group">

                <label>Climate Change</label>

                <input type="number"
                       name="ClimateChange"
                       min="1"
                       max="10"
                       placeholder="Enter value (1-10)"
                       required>

            </div>

            <div class="form-group">

                <label>Drainage Systems</label>

                <input type="number"
                       name="DrainageSystems"
                       min="1"
                       max="10"
                       placeholder="Enter value (1-10)"
                       required>

            </div>

            <div class="form-group">

                <label>River Management</label>

                <input type="number"
                       name="RiverManagement"
                       min="1"
                       max="10"
                       placeholder="Enter value (1-10)"
                       required>

            </div>

            <button type="submit">

                Predict Flood Risk

            </button>

        </form>

    </div>

</section>

<script src="{{ url_for('static', filename='main.js') }}"></script>

</body>
</html>
